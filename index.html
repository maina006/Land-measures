<!DOCTYPE html>
<html>
<head>
    <title>Land Measure Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Land Measure Pro</h1>

<div class="container">

    <canvas id="canvas" width="900" height="600"></canvas>

    <div class="panel">

        <h3>Results</h3>

        <div id="area">
            Area: 0
        </div>

        <div id="perimeter">
            Perimeter: 0
        </div>

        <button id="closeShape">
            Close Shape
        </button>

        <button id="clearShape">
            Clear
        </button>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
